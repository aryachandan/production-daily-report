name: Build Production Daily Report APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: Production-Daily-Report-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: Production-Daily-Report-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Generate Build Report
      if: always()
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
        echo "- Debug APK: app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_STEP_SUMMARY
        echo "- Release APK: app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_STEP_SUMMARY

    - name: Notify on Success
      if: success()
      run: echo "✅ APK build completed successfully!"

    - name: Notify on Failure
      if: failure()
      run: echo "❌ APK build failed. Check logs for details."
